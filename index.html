<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/misto" type="text/css"/>
</head>
<body>
    <div class="main">
        <div class="homePicture">
            <img id="spacePicture" src="images/gratisography-moon-robot-800x525.jpg" alt="Home Picture">
           <div class="caption">
                <h1 id="mainHeader">Lunar Immersion</h1>
           </div>
            
        </div>
        <div class="formContainer">
            <form>
                <div class="fields">
                    <div class="left-fields">
                        <label for="firstName">FIRST NAME</label>
                        <input type="text" id="firstName">

                         <label for="email">EMAIL</label>
                        <input type="email" id="email">

                        <label for="password">PASSWORD</label>
                        <input type="password" id="password">
                    </div>
                    <div class="right-fields">
                        <label for="lastName">LAST NAME</label>
                        <input type="text" id="lastName">

                         <label for="phone">PHONE NUMBER</label>
                        <input type="text" id="phone">

                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm-password">

                    </div>
                </div>
            </form>

        </div>


    </div>
  

    
</body>
</html>
